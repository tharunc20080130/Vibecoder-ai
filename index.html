<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VibeCoder AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg:         #080c0f;
      --bg2:        #0d1217;
      --bg3:        #121a20;
      --border:     #1e2d38;
      --green:      #00ff88;
      --green-dim:  #00cc6a;
      --green-glow: #00ff8840;
      --cyan:       #00d4ff;
      --red:        #ff4466;
      --text:       #c8d8e0;
      --text-dim:   #5a7080;
      --text-bright:#edf4f8;
      --radius:     10px;
      --font-mono:  'JetBrains Mono', monospace;
      --font-ui:    'Syne', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-mono); overflow: hidden; }

    /* scanlines */
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9999;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,136,0.012) 2px, rgba(0,255,136,0.012) 4px);
    }
    /* grid */
    body::after {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image: linear-gradient(rgba(0,255,136,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,136,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    .app { display: flex; flex-direction: column; height: 100vh; position: relative; z-index: 1; }

    /* ── HEADER ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 28px; border-bottom: 1px solid var(--border);
      background: rgba(8,12,15,0.92); backdrop-filter: blur(12px); flex-shrink: 0;
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon {
      width: 36px; height: 36px; border: 1.5px solid var(--green); border-radius: 8px;
      display: grid; place-items: center; box-shadow: 0 0 12px var(--green-glow);
      animation: pulse-border 3s ease-in-out infinite;
    }
    @keyframes pulse-border {
      0%,100% { box-shadow: 0 0 12px var(--green-glow); }
      50%      { box-shadow: 0 0 24px var(--green-glow), 0 0 48px rgba(0,255,136,0.15); }
    }
    .logo-text { font-family: var(--font-ui); font-weight: 800; font-size: 1.2rem; color: var(--text-bright); letter-spacing: -0.02em; }
    .logo-text span { color: var(--green); }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .badge { font-size: 0.65rem; font-weight: 500; padding: 3px 9px; border-radius: 4px; letter-spacing: 0.08em; text-transform: uppercase; }
    .badge-model { background: rgba(0,212,255,0.1); color: var(--cyan); border: 1px solid rgba(0,212,255,0.25); }
    .badge-live  { background: rgba(0,255,136,0.1); color: var(--green); border: 1px solid rgba(0,255,136,0.25); display: flex; align-items: center; gap: 5px; }
    .dot-live { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: blink 1.4s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .btn-clear {
      background: rgba(255,68,102,0.1); color: var(--red); border: 1px solid rgba(255,68,102,0.25);
      border-radius: 6px; padding: 5px 12px; font-family: var(--font-mono); font-size: 0.7rem;
      cursor: pointer; transition: all 0.2s; letter-spacing: 0.06em; text-transform: uppercase;
    }
    .btn-clear:hover { background: rgba(255,68,102,0.2); box-shadow: 0 0 12px rgba(255,68,102,0.2); }

    /* ── MESSAGES ── */
    .messages { flex: 1; overflow-y: auto; padding: 28px; display: flex; flex-direction: column; gap: 20px; }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Welcome */
    .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; padding: 60px 20px; text-align: center; animation: fadeUp 0.6s ease both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .welcome-orb {
      width: 80px; height: 80px; border-radius: 50%; border: 1.5px solid var(--green);
      display: grid; place-items: center; position: relative;
      box-shadow: 0 0 30px var(--green-glow), inset 0 0 30px rgba(0,255,136,0.06);
    }
    .welcome-orb::before { content:''; position:absolute; inset:-8px; border-radius:50%; border:1px solid rgba(0,255,136,0.15); animation:spin 8s linear infinite; }
    .welcome-orb::after  { content:''; position:absolute; inset:-16px; border-radius:50%; border:1px dashed rgba(0,255,136,0.08); animation:spin 14s linear infinite reverse; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .welcome h1 { font-family: var(--font-ui); font-size: 2rem; font-weight: 800; color: var(--text-bright); letter-spacing: -0.03em; }
    .welcome h1 span { color: var(--green); }
    .welcome p { color: var(--text-dim); font-size: 0.85rem; max-width: 380px; line-height: 1.7; }
    .suggestions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; max-width: 600px; }
    .chip {
      background: var(--bg3); border: 1px solid var(--border); color: var(--text);
      border-radius: 6px; padding: 8px 14px; font-size: 0.78rem; cursor: pointer;
      transition: all 0.2s; font-family: var(--font-mono);
    }
    .chip:hover { border-color: var(--green); color: var(--green); box-shadow: 0 0 10px var(--green-glow); transform: translateY(-1px); }

    /* Message bubbles */
    .msg { display: flex; gap: 14px; animation: fadeUp 0.3s ease both; max-width: 860px; }
    .msg.user      { align-self: flex-end;   flex-direction: row-reverse; }
    .msg.assistant { align-self: flex-start; }
    .msg-avatar {
      width: 32px; height: 32px; border-radius: 8px; display: grid; place-items: center;
      flex-shrink: 0; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.02em;
    }
    .msg.user      .msg-avatar { background: rgba(0,212,255,0.15); border: 1px solid rgba(0,212,255,0.3); color: var(--cyan); }
    .msg.assistant .msg-avatar { background: rgba(0,255,136,0.1);  border: 1px solid rgba(0,255,136,0.3); color: var(--green); }
    .msg-bubble { padding: 14px 18px; border-radius: var(--radius); font-size: 0.875rem; line-height: 1.7; max-width: 720px; }
    .msg.user      .msg-bubble { background: rgba(0,212,255,0.08); border: 1px solid rgba(0,212,255,0.2); color: var(--text-bright); border-top-right-radius: 2px; white-space: pre-wrap; word-break: break-word; }
    .msg.assistant .msg-bubble { background: var(--bg2); border: 1px solid var(--border); color: var(--text); border-top-left-radius: 2px; }

    /* Markdown styles */
    .msg-bubble p { margin-bottom: 0.75em; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble code { background: rgba(0,255,136,0.08); color: var(--green); padding: 1px 5px; border-radius: 3px; font-size: 0.85em; font-family: var(--font-mono); }
    .msg-bubble pre { background: #0a0f12; border: 1px solid var(--border); border-radius: 8px; overflow-x: auto; margin: 10px 0; position: relative; }
    .msg-bubble pre code { background: none; color: inherit; padding: 14px 16px; display: block; font-size: 0.82rem; }
    .msg-bubble h1,.msg-bubble h2,.msg-bubble h3 { font-family: var(--font-ui); color: var(--text-bright); margin: 1em 0 0.4em; }
    .msg-bubble h1{font-size:1.15em} .msg-bubble h2{font-size:1.05em} .msg-bubble h3{font-size:0.95em}
    .msg-bubble ul,.msg-bubble ol { padding-left: 1.4em; margin: 0.5em 0; }
    .msg-bubble li { margin-bottom: 0.3em; }
    .msg-bubble strong { color: var(--text-bright); }
    .msg-bubble a { color: var(--cyan); }
    .msg-bubble blockquote { border-left: 2px solid var(--green); padding-left: 12px; color: var(--text-dim); margin: 8px 0; }
    .msg-bubble table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 0.82rem; }
    .msg-bubble th,.msg-bubble td { border: 1px solid var(--border); padding: 6px 12px; text-align: left; }
    .msg-bubble th { background: var(--bg3); color: var(--text-bright); }

    /* Copy button */
    .code-wrap { position: relative; }
    .copy-btn {
      position: absolute; top: 8px; right: 8px;
      background: rgba(0,255,136,0.1); border: 1px solid rgba(0,255,136,0.2);
      color: var(--green-dim); border-radius: 4px; padding: 3px 8px;
      font-family: var(--font-mono); font-size: 0.65rem; cursor: pointer;
      transition: all 0.2s; letter-spacing: 0.06em;
    }
    .copy-btn:hover { background: rgba(0,255,136,0.2); color: var(--green); }

    /* Thinking dots */
    .thinking { display: flex; align-items: center; gap: 5px; padding: 14px 18px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); border-top-left-radius: 2px; width: fit-content; }
    .thinking-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: bounce 1.2s ease-in-out infinite; }
    .thinking-dot:nth-child(2){animation-delay:0.2s} .thinking-dot:nth-child(3){animation-delay:0.4s}
    @keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-6px);opacity:1} }

    /* ── INPUT ── */
    .input-area { padding: 16px 28px 20px; border-top: 1px solid var(--border); background: rgba(8,12,15,0.95); backdrop-filter: blur(12px); flex-shrink: 0; }
    .input-wrap {
      display: flex; align-items: flex-end; gap: 10px;
      background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
      padding: 10px 10px 10px 16px; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-wrap:focus-within { border-color: rgba(0,255,136,0.4); box-shadow: 0 0 20px rgba(0,255,136,0.08); }
    #chat-input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text-bright); font-family: var(--font-mono); font-size: 0.875rem;
      line-height: 1.6; resize: none; max-height: 160px; min-height: 24px;
    }
    #chat-input::placeholder { color: var(--text-dim); }
    .send-btn {
      width: 38px; height: 38px; border-radius: 8px; background: var(--green);
      border: none; cursor: pointer; display: grid; place-items: center; flex-shrink: 0;
      transition: all 0.2s; box-shadow: 0 0 12px rgba(0,255,136,0.3);
    }
    .send-btn:hover:not(:disabled) { background: var(--green-dim); box-shadow: 0 0 20px rgba(0,255,136,0.5); transform: scale(1.05); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }
    .send-btn svg { width: 16px; height: 16px; color: #000; }
    .input-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; padding: 0 4px; }
    .input-hint  { font-size: 0.65rem; color: var(--text-dim); }
    .token-count { font-size: 0.65rem; color: var(--text-dim); }

    /* Error */
    .error-msg { color: var(--red); font-size: 0.8rem; padding: 8px 14px; background: rgba(255,68,102,0.07); border: 1px solid rgba(255,68,102,0.2); border-radius: 6px; }

    /* Toast */
    .toast {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--bg3); border: 1px solid var(--green); color: var(--green);
      padding: 8px 20px; border-radius: 6px; font-size: 0.78rem;
      opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 1000;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 600px) {
      header { padding: 12px 16px; }
      .messages { padding: 16px; }
      .input-area { padding: 12px 16px 16px; }
      .badge-model { display: none; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00ff88" stroke-width="2" stroke-linecap="round">
          <polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/>
        </svg>
      </div>
      <div class="logo-text">Vibe<span>Coder</span> AI</div>
    </div>
    <div class="header-right">
      <div class="badge badge-model">llama-3.3 · groq</div>
      <div class="badge badge-live"><div class="dot-live"></div>online</div>
      <button class="btn-clear" onclick="clearChat()">[ clear ]</button>
    </div>
  </header>

  <!-- MESSAGES -->
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-orb">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#00ff88" stroke-width="1.5">
          <polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/>
        </svg>
      </div>
      <h1>Vibe<span>Coder</span> AI</h1>
      <p>Your AI coding companion. Ask anything — debug, architect, learn, ship.</p>
      <div class="suggestions">
        <div class="chip" onclick="useSuggestion(this)">Debug my React hook</div>
        <div class="chip" onclick="useSuggestion(this)">Explain async/await</div>
        <div class="chip" onclick="useSuggestion(this)">Write a REST API in Node</div>
        <div class="chip" onclick="useSuggestion(this)">Optimize my SQL query</div>
        <div class="chip" onclick="useSuggestion(this)">CSS grid cheat sheet</div>
        <div class="chip" onclick="useSuggestion(this)">Docker compose setup</div>
      </div>
    </div>
  </div>

  <!-- INPUT -->
  <div class="input-area">
    <div class="input-wrap">
      <textarea
        id="chat-input"
        placeholder="Ask anything... ship faster →"
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="input-footer">
      <span class="input-hint">⏎ send &nbsp;·&nbsp; ⇧⏎ newline</span>
      <span class="token-count" id="token-count"></span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  marked.setOptions({ breaks: true, gfm: true });

  let history    = [];
  let isLoading  = false;
  let totalTokens = 0;

  const msgsEl   = document.getElementById('messages');
  const inputEl  = document.getElementById('chat-input');
  const sendBtn  = document.getElementById('send-btn');
  const toastEl  = document.getElementById('toast');
  const tokenEl  = document.getElementById('token-count');

  /* ── helpers ── */
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function useSuggestion(el) {
    inputEl.value = el.textContent;
    autoResize(inputEl);
    sendMessage();
  }

  function scrollBottom() { msgsEl.scrollTop = msgsEl.scrollHeight; }

  function setLoading(v) {
    isLoading = v;
    sendBtn.disabled = v;
    inputEl.disabled = v;
  }

  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(() => toastEl.classList.remove('show'), 2000);
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function removeWelcome() {
    const w = document.getElementById('welcome');
    if (w) w.remove();
  }

  /* ── render ── */
  function addCopyButtons(container) {
    container.querySelectorAll('pre').forEach(pre => {
      const wrap = document.createElement('div');
      wrap.className = 'code-wrap';
      pre.parentNode.insertBefore(wrap, pre);
      wrap.appendChild(pre);
      const btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.textContent = 'copy';
      btn.onclick = () => {
        const code = pre.querySelector('code');
        navigator.clipboard.writeText(code ? code.textContent : pre.textContent)
          .then(() => { btn.textContent = 'copied!'; setTimeout(() => btn.textContent = 'copy', 1800); });
      };
      wrap.appendChild(btn);
    });
    container.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
  }

  function appendMsg(role, content) {
    removeWelcome();
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const avatar = role === 'user' ? 'YOU' : 'AI';
    const bubble = role === 'assistant'
      ? `<div class="msg-bubble">${marked.parse(content)}</div>`
      : `<div class="msg-bubble">${escHtml(content)}</div>`;
    div.innerHTML = `<div class="msg-avatar">${avatar}</div>${bubble}`;
    msgsEl.appendChild(div);
    if (role === 'assistant') addCopyButtons(div);
    scrollBottom();
    return div;
  }

  function appendThinking() {
    removeWelcome();
    const div = document.createElement('div');
    div.className = 'msg assistant';
    div.id = 'thinking';
    div.innerHTML = `<div class="msg-avatar">AI</div>
      <div class="thinking">
        <div class="thinking-dot"></div>
        <div class="thinking-dot"></div>
        <div class="thinking-dot"></div>
      </div>`;
    msgsEl.appendChild(div);
    scrollBottom();
    return div;
  }

  function appendError(msg) {
    removeWelcome();
    const div = document.createElement('div');
    div.className = 'msg assistant';
    div.innerHTML = `<div class="msg-avatar">AI</div><div class="error-msg">⚠ ${escHtml(msg)}</div>`;
    msgsEl.appendChild(div);
    scrollBottom();
  }

  /* ── clear ── */
  function clearChat() {
    history = [];
    totalTokens = 0;
    tokenEl.textContent = '';
    msgsEl.innerHTML = `
      <div class="welcome" id="welcome">
        <div class="welcome-orb">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#00ff88" stroke-width="1.5">
            <polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/>
          </svg>
        </div>
        <h1>Vibe<span>Coder</span> AI</h1>
        <p>Your AI coding companion. Ask anything — debug, architect, learn, ship.</p>
        <div class="suggestions">
          <div class="chip" onclick="useSuggestion(this)">Debug my React hook</div>
          <div class="chip" onclick="useSuggestion(this)">Explain async/await</div>
          <div class="chip" onclick="useSuggestion(this)">Write a REST API in Node</div>
          <div class="chip" onclick="useSuggestion(this)">Optimize my SQL query</div>
          <div class="chip" onclick="useSuggestion(this)">CSS grid cheat sheet</div>
          <div class="chip" onclick="useSuggestion(this)">Docker compose setup</div>
        </div>
      </div>`;
    showToast('Chat cleared');
  }

  /* ── send ── */
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    history.push({ role: 'user', content: text });
    appendMsg('user', text);
    setLoading(true);
    const thinking = appendThinking();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });

      const data = await res.json();
      thinking.remove();

      if (!res.ok || data.error) {
        appendError(data.error || 'Something went wrong. Check your GROQ_API_KEY in Vercel settings.');
        history.pop();
      } else {
        history.push({ role: 'assistant', content: data.reply });
        appendMsg('assistant', data.reply);
        if (data.usage) {
          totalTokens += (data.usage.prompt_tokens || 0) + (data.usage.completion_tokens || 0);
          tokenEl.textContent = `~${totalTokens.toLocaleString()} tokens`;
        }
      }
    } catch (err) {
      thinking.remove();
      appendError('Network error — make sure the server is running and GROQ_API_KEY is set.');
      history.pop();
    }

    setLoading(false);
    inputEl.focus();
  }

  inputEl.focus();
</script>
</body>
</html>
